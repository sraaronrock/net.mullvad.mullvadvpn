app-id: net.mullvad.mullvadvpn
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: mullvad-vpn
separate-locales: false
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --talk-name=org.freedesktop.secrets
  - --system-talk-name=org.freedesktop.NetworkManager
  - --talk-name=org.kde.StatusNotifierWatcher
  - --socket=system-bus
  - --filesystem=/run/mullvad-vpn
modules:
  - name: mullvad
    buildsystem: simple
    build-commands:
      - bsdtar -Oxf mullvad.deb 'data.tar.xz' | bsdtar -xf -
      - install -Dm755 usr/bin/mullvad $FLATPAK_DEST/bin/mullvad
      - mkdir -p "$FLATPAK_DEST/opt"
      - cp -a "opt/Mullvad VPN" "$FLATPAK_DEST/opt/"
      - rm -f "$FLATPAK_DEST/opt/Mullvad VPN/chrome-sandbox"
      - mkdir -p "$FLATPAK_DEST/bin"
      - printf '#!/usr/bin/env bash\ncd "/app/opt/Mullvad VPN"\nexec ./mullvad-vpn --no-sandbox \"$@\"\n' > "$FLATPAK_DEST/bin/mullvad-vpn"
      - chmod +x "$FLATPAK_DEST/bin/mullvad-vpn"
      - desktop-file-edit --set-key=Exec --set-value="mullvad-vpn %U" net.mullvad.mullvadvpn.desktop
      - desktop-file-edit --set-icon=net.mullvad.mullvadvpn net.mullvad.mullvadvpn.desktop
      - install -Dm644 net.mullvad.mullvadvpn.desktop $FLATPAK_DEST/share/applications/net.mullvad.mullvadvpn.desktop
      - install -Dm644 net.mullvad.mullvadvpn.svg $FLATPAK_DEST/share/icons/hicolor/scalable/apps/net.mullvad.mullvadvpn.svg
      - install -Dm644 net.mullvad.mullvadvpn.metainfo.xml $FLATPAK_DEST/share/metainfo/net.mullvad.mullvadvpn.metainfo.xml
    sources:
      - type: file
        url: https://github.com/mullvad/mullvadvpn-app/releases/download/2026.01/MullvadVPN-2026.1_amd64.deb
        sha256: 1e579a8db11bc3967569bfc4e33491f86c43388baf7a03f837dc9115962fef3e
        only-arches: [x86_64]
        dest-filename: mullvad.deb
      - type: file
        url: https://github.com/mullvad/mullvadvpn-app/releases/download/2026.01/MullvadVPN-2026.1_arm64.deb
        sha256: 326d85e8f075e691e0469b30d5cd4f8e620072e19aaa17c07994b91d77685914
        only-arches: [aarch64]
        dest-filename: mullvad.deb
      - type: file
        path: net.mullvad.mullvadvpn.metainfo.xml
      - type: file
        path: net.mullvad.mullvadvpn.desktop
      - type: file
        path: net.mullvad.mullvadvpn.svg