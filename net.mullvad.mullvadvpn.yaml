app-id: net.mullvad.mullvadvpn
base: org.freedesktop.Sdk
base-version: '25.08'
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: mullvad
separate-locales: false
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --talk-name=org.freedesktop.NetworkManager
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: mullvad
    buildsystem: simple
    build-commands:
      - bsdtar -Oxf mullvad.deb 'data.tar.xz' | bsdtar -xf -
      - install -Dm755 usr/bin/mullvad $FLATPAK_DEST/bin/mullvad
      - desktop-file-edit --set-key=Exec --set-value="mullvad %U" net.mullvad.mullvadvpn.desktop
      - desktop-file-edit --set-icon=net.mullvad.mullvadvpn net.mullvad.mullvadvpn.desktop
      - install -Dm644 net.mullvad.mullvadvpn.desktop $FLATPAK_DEST/share/applications/net.mullvad.mullvadvpn.desktop
      - find usr/share/icons -name "*.png" -exec install -Dm644 {} $FLATPAK_DEST/share/icons/hicolor/{} \;
      - install -Dm644 net.mullvad.mullvadvpn.metainfo.xml $FLATPAK_DEST/share/metainfo/net.mullvad.mullvadvpn.metainfo.xml
    sources:
      - type: extra-data
        url: https://github.com/mullvad/mullvadvpn-app/releases/download/2025.14/MullvadVPN-2025.14_amd64.deb
        sha256: 247b981e2e2e047ccca296b8e62a70b1dc7fdcec7f17137795884100240e0a41
        size: 111043256
        only-arches: [x86_64]
        filename: mullvad.deb
      - type: extra-data
        url: https://github.com/mullvad/mullvadvpn-app/releases/download/2025.14/MullvadVPN-2025.14_arm64.deb
        sha256: 9a20a1d71eac09c01b83d897ed227361cc49f0321054d76b83a6f7f61b7c813c
        size: 103917316
        only-arches: [aarch64]
        filename: mullvad.deb
      - type: file
        path: net.mullvad.mullvadvpn.metainfo.xml
      - type: file
        path: net.mullvad.mullvadvpn.desktop
